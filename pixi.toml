[workspace]
description = "Mojo SQLite3 Bindings"
authors = ["Mikhail Tavarez <miktavarez@gmail.com>"]
channels = ["https://repo.prefix.dev/mojo-community", "conda-forge", "https://conda.modular.com/max", "https://prefix.dev/pixi-build-backends"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
license = "MIT"
license-file = "LICENSE"
readme = "README.md"
homepage = "https://github.com/thatstoasty/mojo-sqlite3"
repository = "https://github.com/thatstoasty/mojo-sqlite3"
preview = ["pixi-build"]

[tasks]
tests = "sh -c 'find test -name \"test_*.mojo\" -exec mojo -D ASSERT=all -I . {} \\;'"
benchmarks = "sh -c 'find benchmarks -name \"*.mojo\" -exec mojo -D ASSERT=all -I . {} \\;'"
examples = "sh -c 'find examples -name \"*.mojo\" -exec mojo -D ASSERT=all -I . {} \\;'"

# Linting and Formatting
lint_docs = "mojo doc --Werror --diagnose-missing-doc-strings -o /dev/null ./slight"
format = "mojo format slight --line-length 120"

# Build and publish
build = { cmd = "pixi build -o ." }
publish = { cmd = "find . -name 'slight-*.conda' | xargs pixi upload https://prefix.dev/api/v1/upload/mojo-community" }
build_and_publish = [{ task = "build" }, { task = "publish" }]

[package]
name = "slight"
version = "0.1.2"

[package.build]
backend = { name = "pixi-build-mojo", version = "*" }

[dependencies]
mojo = ">=0.26.2.0,<0.26.3.0"
sqlite = ">=3.50.4"

[package.build-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"

[package.host-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"
sqlite = ">=3.50.4"

[package.run-dependencies]
mojo-compiler = ">=0.26.2.0,<0.26.3.0"
sqlite = ">=3.50.4"
